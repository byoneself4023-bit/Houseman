services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: houseman
      POSTGRES_USER: houseman
      POSTGRES_PASSWORD: houseman
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U houseman"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./houseman-server
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/houseman
      SPRING_DATASOURCE_USERNAME: houseman
      SPRING_DATASOURCE_PASSWORD: houseman
      SPRING_PROFILES_ACTIVE: prod
    ports:
      - "8080:8080"

  client:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - server
    ports:
      - "80:80"

volumes:
  pgdata:
