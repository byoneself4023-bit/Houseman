spring:
  application:
    name: houseman
  datasource:
    url: jdbc:postgresql://localhost:5434/houseman
    username: houseman
    password: houseman
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100
    open-in-view: false
    show-sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    property-naming-strategy: SNAKE_CASE
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

jwt:
  secret: houseman-jwt-secret-key-for-development-minimum-256-bits-long
  access-expiration: 3600000
  refresh-expiration: 604800000

server:
  port: 8080
  shutdown: graceful

cors:
  allowed-origins: http://localhost:5173

springdoc:
  swagger-ui:
    path: /swagger-ui
